<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f0f4f8; }
        h1 { color: #333; }
        .result-box { background: white; border-radius: 10px; padding: 20px; display: inline-block; margin: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        img { max-width: 300px; border-radius: 8px; }
        .graphs img { max-width: 500px; margin: 10px; }
        a { display: inline-block; margin-top: 20px; color: #4a90e2; text-decoration: none; font-size: 16px; }
    </style>
</head>
<body>
    <h1>🔍 Prediction Result</h1>

    <div class="result-box">
        <img src="{{ image_path }}" alt="Uploaded image"><br><br>
        <h2>Predicted: <strong>{{ label }}</strong></h2>
        <p>Confidence: {{ confidence }}%</p>
    </div>

    <h2>📊 Training Graphs</h2>
    <div class="graphs">
        <img src="/static/train_loss.png" alt="Train Loss"><br>
        <img src="/static/val_loss.png" alt="Validation Loss"><br>
        <img src="/static/accuracy.png" alt="Top-1 Accuracy">
    </div>

    <a href="/">← Upload another image</a>
</body>
</html>
